# Server
server.port=8080
spring.application.name=chat-backend

# -------------------------------------------------------
# Profiles:
#   h2       → H2 in-memory (default, no setup needed)
#   postgres → PostgreSQL   (production-ready)
#
# Switch: -Dspring.profiles.active=postgres
# -------------------------------------------------------
spring.profiles.active=h2

# JPA (shared)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:chatapp_super_secret_key_must_be_at_least_32_characters}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html