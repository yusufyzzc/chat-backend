# =====================================================
# H2 In-Memory Profile
# Active by default. No external setup required.
# Data resets on every restart.
# =====================================================

spring.datasource.url=jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 web console → http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:chatdb  |  User: sa  |  Password: (empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
