# =====================================================
# PostgreSQL Profile
# Activate with: -Dspring.profiles.active=postgres
#
# Credentials via environment variables:
#   DB_URL       default: jdbc:postgresql://localhost:5432/chatdb
#   DB_USERNAME  default: postgres
#   DB_PASSWORD  default: postgres
# =====================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' → schema evolves without data loss
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false
